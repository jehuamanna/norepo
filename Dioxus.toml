[application]

[bundle]
identifier = "com.operon.dioxus"
publisher = "Operon"
copyright = "Copyright (c) 2026 Operon"
category = "Productivity"
short_description = "Operon — local-first notes editor"
long_description = "Operon-dioxus is a local-first, project-aware notes editor."

# Sidecar binaries: shipped alongside the main binary so the runtime
# sibling-probe in `resolve_shim_from_exe` / `resolve_operon_posttool_hook`
# finds them in installed release builds.
#
# - operon-mcp-permission: MCP shim for tool-call approvals (Bash/Edit/Write).
# - operon-posttool-hook: PostToolUse reload hook — Claude Code dispatches
#   this after every Write/Edit/MultiEdit so Operon can reload the matching
#   open tab from disk over a Unix socket (more reliable than inotify).
#
# Cross-platform mechanism — `dx bundle` looks for a file named
# `<bin>-<target-triple>` at the crate root and copies it next to the main
# exe. Build pipeline: `scripts/build-release.sh` runs
# `cargo build --release --bin <bin>` for each, renames to the expected
# `-<triple>` filename, then invokes `dx bundle`. Layout per OS:
#   .deb / .AppImage  →  /usr/bin/<bin> (sibling of main)
#   .app / .dmg       →  Operon.app/Contents/MacOS/<bin>
#   .msi / .exe       →  alongside operon-dioxus.exe in the install dir
external_bin = ["operon-mcp-permission", "operon-posttool-hook"]

[web.app]

# HTML title tag content
title = "operon-dioxus"

# include `assets` in web platform
[web.resource]

# Additional CSS style files
style = []

# Additional JavaScript files
script = []

[web.resource.dev]

# Javascript code file
# serve: [dev-server] only
script = []
