[workspace]
members = [".", "tests-wasm"]

[package]
name = "operon-dioxus"
version = "0.1.0"
authors = ["jehuamanna <jehuamanna@gmail.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
dioxus = { version = "0.7.1", features = ["router"] }
# `futures-timer` powers SaveScheduler's debounce. The `wasm-bindgen` feature is required for
# the wasm32 target to use `setTimeout`-based futures (gloo-timers under the hood); without it
# `Delay` panics with "no executor present" in the browser.
futures-timer = { version = "3.0.3", features = ["wasm-bindgen"] }
pulldown-cmark = { version = "0.10", default-features = false }
# `std::time::SystemTime::now()` panics with "time not implemented on this platform"
# under `wasm32-unknown-unknown`. `web-time` is a drop-in replacement that uses
# `js_sys::Date::now()` on wasm and `std::time` everywhere else.
web-time = "1"

# === Agent runtime substrate (Plans-Phase-1) ===
async-trait = "0.1"
bitflags = "2"
figment = { version = "0.10", features = ["toml", "env"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }

# === Agent runtime (Plans-Phase-2) ===
tokio-stream = "0.1"
async-stream = "0.3"

# `web_sys` bindings used only on the wasm web build for localStorage + prefers-color-scheme.
# Native tests stub these out so the dependency is wasm-only.
[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Document",
    "DomException",
    "Element",
    "FileSystemDirectoryHandle",
    "FileSystemFileHandle",
    "FileSystemGetFileOptions",
    "FileSystemRemoveOptions",
    "FileSystemWritableFileStream",
    "HtmlElement",
    "IdbCursor",
    "IdbCursorDirection",
    "IdbCursorWithValue",
    "IdbDatabase",
    "IdbFactory",
    "IdbObjectStore",
    "IdbOpenDbRequest",
    "IdbRequest",
    "IdbRequestReadyState",
    "IdbTransaction",
    "IdbTransactionMode",
    "IdbVersionChangeEvent",
    "MediaQueryList",
    "Navigator",
    "Storage",
    "StorageManager",
    "Window",
] }
tracing-wasm = "0.2"
uuid = { version = "1", features = ["v4", "serde", "js"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
notify = "6"
tempfile = "3"
keyring = { version = "2", default-features = false, features = ["linux-secret-service-rt-tokio-crypto-rust"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "io-util"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
rusqlite = { version = "0.32", features = ["bundled"], optional = true }
rusqlite_migration = { version = "1", optional = true }

[features]
default = ["desktop"]
web = ["dioxus/web"]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]
sqlite-memory = ["dep:rusqlite", "dep:rusqlite_migration"]

[dev-dependencies]
pretty_assertions = "1.4"
