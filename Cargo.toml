[workspace]
members = [".", "tests-wasm"]

[package]
name = "operon-dioxus"
version = "0.1.0"
authors = ["jehuamanna <jehuamanna@gmail.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
dioxus = { version = "0.7.1", features = ["router"] }
pulldown-cmark = { version = "0.10", default-features = false }
# `std::time::SystemTime::now()` panics with "time not implemented on this platform"
# under `wasm32-unknown-unknown`. `web-time` is a drop-in replacement that uses
# `js_sys::Date::now()` on wasm and `std::time` everywhere else.
web-time = "1"

# `web_sys` bindings used only on the wasm web build for localStorage + prefers-color-scheme.
# Native tests stub these out so the dependency is wasm-only.
[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Document",
    "Element",
    "HtmlElement",
    "MediaQueryList",
    "Navigator",
    "Storage",
    "Window",
] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
notify = "6"
tempfile = "3"

[features]
default = ["desktop"]
web = ["dioxus/web"]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]

[dev-dependencies]
pretty_assertions = "1.4"
