name: release

# Manual trigger from the Actions tab + automatic on `v*` tags. Builds
# standalone bundles for Linux, macOS, and Windows in parallel and
# attaches them to a GitHub release.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bundle:
    name: bundle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            host: linux
            artifact_glob: 'target/dx/operon-dioxus/release/linux/app/bundle/{deb,appimage}/*'
          - os: macos-latest
            host: macos
            artifact_glob: 'target/dx/operon-dioxus/release/macos/app/bundle/{macos,dmg}/*'
          - os: windows-latest
            host: windows
            artifact_glob: 'target/dx/operon-dioxus/release/windows/app/bundle/{msi,nsis}/*'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Linux build deps for wry (webkit2gtk + friends).
      - name: apt install (linux)
        if: matrix.host == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            librsvg2-dev libssl-dev libsqlite3-dev \
            pkg-config build-essential

      - name: install dioxus-cli
        run: cargo install dioxus-cli --version 0.7.7 --locked

      - name: build (bash)
        if: matrix.host != 'windows'
        shell: bash
        run: ./scripts/build-release.sh

      - name: build (git bash on windows)
        if: matrix.host == 'windows'
        shell: bash
        run: ./scripts/build-release.sh

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operon-${{ matrix.host }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: github release
    needs: bundle
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
